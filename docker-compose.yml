services:
  localstack:
    image: localstack/localstack:latest
    container_name: chatr-localstack
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      - SERVICES=s3,dynamodb,ses,rekognition,apigatewayv2
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./localstack_data}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh" # Auto-initialize resources

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatr-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT=http://localstack:4566
      - DYNAMODB_TABLE_USERS=Users
      - DYNAMODB_TABLE_MESSAGES=Messages
      - DYNAMODB_TABLE_CONNECTIONS=Connections
      - S3_BUCKET_UPLOADS=chatr-uploads
      - JWT_SECRET=my_jwt_secret_key
    depends_on:
      - localstack

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatr-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
